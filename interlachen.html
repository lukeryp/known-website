<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Known — Interlachen Country Club</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Known — Interlachen">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#1a472a">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    :root {
      --green-900: #0f2618;
      --green-800: #1a472a;
      --green-700: #2d6a4f;
      --green-600: #40916c;
      --gold: #c8a951;
      --gold-light: #e8c975;
      --gold-dim: rgba(200,169,81,0.3);
      --white: #ffffff;
      --gray-100: #f8f9fa;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --red: #ef4444;
      --green-ok: #22c55e;
      --tier1: #c8a951;
      --tier2: #a0aec0;
      --tier3: #cd7f32;
      --tier4: #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--green-900); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }
    body { display: flex; flex-direction: column; }

    /* PASSWORD GATE */
    #gate { position: fixed; inset: 0; background: var(--green-900); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    #gate.hidden { display: none; }
    #gate h1 { font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
    #gate p { color: var(--gray-400); font-size: 14px; }
    #gate input { width: 200px; padding: 14px; font-size: 24px; text-align: center; background: rgba(255,255,255,0.08); border: 2px solid var(--gold-dim); border-radius: 12px; color: var(--white); letter-spacing: 8px; outline: none; }
    #gate input:focus { border-color: var(--gold); }
    #gate .shake { animation: shake 0.5s ease-in-out; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-10px); } 40%,80% { transform: translateX(10px); } }
    #gate .hint { font-size: 12px; color: var(--red); min-height: 18px; }
    #gate .club-badge { font-size: 13px; color: var(--gray-400); margin-top: 20px; }

    /* APP SHELL */
    #app { display: none; flex-direction: column; height: 100%; }
    #app.active { display: flex; }

    /* HEADER */
    .header { background: var(--green-800); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--gold-dim); flex-shrink: 0; }
    .header .logo { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: var(--green-900); }
    .header .title { flex: 1; }
    .header .title h2 { font-size: 16px; font-weight: 700; color: var(--gold); }
    .header .title p { font-size: 11px; color: var(--gray-400); }

    /* TABS */
    .tab-bar { display: flex; background: var(--green-800); border-bottom: 1px solid var(--gold-dim); flex-shrink: 0; }
    .tab-bar button { flex: 1; padding: 10px 4px; font-size: 12px; font-weight: 600; background: none; border: none; color: var(--gray-400); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab-bar button.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* TAB CONTENT */
    .tab-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .tab-pane { display: none; height: 100%; overflow-y: auto; }
    .tab-pane.active { display: block; }

    /* LEARN TAB */
    .learn-controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; background: var(--green-800); border-bottom: 1px solid var(--gold-dim); }
    .mode-toggle { display: flex; background: rgba(255,255,255,0.06); border-radius: 8px; overflow: hidden; }
    .mode-toggle button { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; background: none; border: none; color: var(--gray-400); cursor: pointer; }
    .mode-toggle button.active { background: var(--gold); color: var(--green-900); }
    .tier-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .tier-filters button { padding: 6px 10px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--gray-400); cursor: pointer; }
    .tier-filters button.active { border-color: var(--gold); color: var(--gold); background: rgba(200,169,81,0.15); }
    .progress-bar-container { display: flex; align-items: center; gap: 8px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.3s; }
    .progress-text { font-size: 11px; color: var(--gray-400); white-space: nowrap; }

    /* QUIZ CARD */
    .quiz-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px; min-height: 0; }
    .quiz-card { width: 100%; max-width: 400px; text-align: center; }
    .member-photo { width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 3px solid var(--gold-dim); margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
    .member-photo svg { width: 60px; height: 60px; fill: var(--gray-400); }
    .choices { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .choice-btn { padding: 14px 16px; font-size: 15px; font-weight: 500; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: var(--white); cursor: pointer; transition: all 0.15s; text-align: left; }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn.correct { background: rgba(34,197,94,0.2); border-color: var(--green-ok); color: var(--green-ok); }
    .choice-btn.wrong { background: rgba(239,68,68,0.2); border-color: var(--red); color: var(--red); }
    .choice-btn.reveal { background: rgba(34,197,94,0.15); border-color: var(--green-ok); }
    .member-details { margin-top: 16px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; text-align: left; font-size: 13px; line-height: 1.6; }
    .member-details .detail-name { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .member-details .detail-row { display: flex; justify-content: space-between; color: var(--gray-300); }
    .member-details .detail-label { color: var(--gray-400); }
    .tap-hint { font-size: 12px; color: var(--gray-400); margin-top: 16px; opacity: 0; transition: opacity 0.3s; }
    .tap-hint.show { opacity: 1; }

    /* RECALL MODE */
    .recall-reveal { padding: 16px 24px; font-size: 15px; font-weight: 600; background: var(--gold); color: var(--green-900); border: none; border-radius: 10px; cursor: pointer; margin-top: 16px; }

    /* LISTS TAB */
    .lists-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .list-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; cursor: pointer; }
    .list-card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
    .list-card-header h3 { font-size: 15px; font-weight: 600; color: var(--white); }
    .deadline-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
    .deadline-badge.urgent { background: rgba(239,68,68,0.2); color: var(--red); }
    .deadline-badge.soon { background: rgba(234,179,8,0.2); color: #eab308; }
    .deadline-badge.ok { background: rgba(34,197,94,0.15); color: var(--green-ok); }
    .list-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 12px; color: var(--gray-400); }
    .list-progress { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .list-progress .fill { height: 100%; background: var(--gold); border-radius: 3px; }
    .list-actions { display: flex; gap: 8px; }
    .list-actions button { flex: 1; padding: 8px; font-size: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; }
    .btn-test { background: var(--gold); color: var(--green-900); }
    .btn-view { background: rgba(255,255,255,0.08); color: var(--gray-300); border: 1px solid rgba(255,255,255,0.12) !important; }

    /* LIST DETAIL */
    .list-detail { padding: 16px; }
    .list-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .list-detail-header button { background: none; border: none; color: var(--gold); font-size: 24px; cursor: pointer; }
    .list-detail-header h3 { font-size: 16px; font-weight: 600; }
    .member-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 8px; }
    .member-list-item .mini-photo { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .member-list-item .mini-photo svg { width: 18px; height: 18px; fill: var(--gray-400); }
    .member-list-item .info { flex: 1; }
    .member-list-item .info .name { font-size: 14px; font-weight: 600; }
    .member-list-item .info .meta { font-size: 11px; color: var(--gray-400); }
    .tier-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    .tier-badge.t1 { background: rgba(200,169,81,0.2); color: var(--tier1); }
    .tier-badge.t2 { background: rgba(160,174,192,0.2); color: var(--tier2); }
    .tier-badge.t3 { background: rgba(205,127,50,0.2); color: var(--tier3); }
    .tier-badge.t4 { background: rgba(107,114,128,0.2); color: var(--tier4); }
    .mastery-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mastery-dot.mastered { background: var(--green-ok); }
    .mastery-dot.learning { background: var(--gold); }
    .mastery-dot.new { background: var(--gray-600); }

    /* STAFF TAB */
    .staff-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .staff-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; display: flex; gap: 14px; }
    .staff-photo { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .staff-photo svg { width: 28px; height: 28px; fill: var(--gray-400); }
    .staff-info { flex: 1; }
    .staff-info .name { font-size: 16px; font-weight: 700; color: var(--gold); }
    .staff-info .title { font-size: 13px; color: var(--gray-300); margin: 2px 0 8px; }
    .staff-info .desc { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; }
    .staff-contact { display: flex; flex-direction: column; gap: 4px; }
    .staff-contact a { font-size: 12px; color: var(--gold); text-decoration: none; display: flex; align-items: center; gap: 6px; }

    /* DATABASE TAB */
    .db-controls { padding: 12px 16px; background: var(--green-800); border-bottom: 1px solid var(--gold-dim); display: flex; flex-direction: column; gap: 8px; }
    .db-search { width: 100%; padding: 10px 14px; font-size: 14px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--white); outline: none; }
    .db-search:focus { border-color: var(--gold); }
    .db-search::placeholder { color: var(--gray-600); }
    .db-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .db-filters select { padding: 6px 8px; font-size: 11px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--gray-300); -webkit-appearance: none; outline: none; }
    .db-list { padding: 12px 16px; }
    .db-count { font-size: 12px; color: var(--gray-400); margin-bottom: 10px; }
    .db-member { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
    .db-member .mini-photo { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .db-member .mini-photo svg { width: 20px; height: 20px; fill: var(--gray-400); }
    .db-member .info { flex: 1; min-width: 0; }
    .db-member .info .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .db-member .info .meta { font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .db-member .rounds { text-align: right; flex-shrink: 0; }
    .db-member .rounds .num { font-size: 18px; font-weight: 700; color: var(--gold); }
    .db-member .rounds .label { font-size: 10px; color: var(--gray-400); }

    /* PROFILE MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .profile-card { background: var(--green-800); border: 1px solid var(--gold-dim); border-radius: 16px; padding: 24px; width: 100%; max-width: 380px; }
    .profile-card .close-btn { float: right; background: none; border: none; color: var(--gray-400); font-size: 24px; cursor: pointer; line-height: 1; }
    .profile-card .photo-lg { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 3px solid var(--gold-dim); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
    .profile-card .photo-lg svg { width: 36px; height: 36px; fill: var(--gray-400); }
    .profile-card .p-name { text-align: center; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .profile-card .p-tier { text-align: center; margin-bottom: 16px; }
    .profile-card .p-fields { display: flex; flex-direction: column; gap: 8px; }
    .profile-card .p-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .profile-card .p-field .label { color: var(--gray-400); font-size: 13px; }
    .profile-card .p-field .value { color: var(--white); font-size: 13px; font-weight: 500; }

    /* QUIZ FROM LIST - back button */
    .quiz-back { position: absolute; top: 12px; left: 16px; background: none; border: none; color: var(--gold); font-size: 14px; cursor: pointer; z-index: 5; display: none; }
    .quiz-back.show { display: block; }

    /* UTILITY */
    .hidden { display: none !important; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
    .empty-state svg { width: 48px; height: 48px; fill: var(--gray-600); margin-bottom: 12px; }
    .complete-state { text-align: center; padding: 40px 20px; }
    .complete-state h3 { font-size: 24px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
    .complete-state p { color: var(--gray-400); font-size: 14px; }

    @media (min-width: 600px) {
      .quiz-card { max-width: 440px; }
      .member-photo { width: 160px; height: 160px; }
      .choice-btn { font-size: 16px; padding: 16px; }
    }
  </style>
</head>

  <!-- PASSWORD GATE -->
  <div id="gate">
    <h1>KNOWN</h1>
    <p>Interlachen Country Club</p>
    <input type="password" id="gate-input" maxlength="4" inputmode="numeric" placeholder="••••" autocomplete="off">
    <div class="hint" id="gate-hint"></div>
    <div class="club-badge">Est. 1909 &middot; Edina, Minnesota</div>
  </div>

  <!-- APP -->
  <div id="app">

        <p>Member Recognition Training</p>
      </div>
    </div>
    <div class="tab-bar">
      <button class="active" data-tab="learn">Learn</button>
      <button data-tab="lists">Lists</button>
      <button data-tab="staff">Staff</button>
      <button data-tab="database">Database</button>
    </div>
    <div class="tab-content">
      <!-- LEARN TAB -->
      <div class="tab-pane active" id="tab-learn">
        <div class="learn-controls">
          <div class="mode-toggle">
            <button class="active" data-mode="quiz">Multiple Choice</button>
            <button data-mode="recall">Recall</button>
          </div>
          <div class="tier-filters">
            <button class="active" data-tier="1">T1 (87)</button>
            <button data-tier="2">T2 (207)</button>
            <button data-tier="3">T3 (326)</button>
            <button data-tier="4">T4 (400)</button>
            <button data-tier="all">All</button>
          </div>
          <div class="progress-bar-container">
            <div class="progress-bar"><div class="fill" id="learn-progress-fill"></div></div>
            <div class="progress-text" id="learn-progress-text">0/87 mastered</div>
          </div>
        </div>
        <div class="quiz-area" id="quiz-area">
          <button class="quiz-back" id="quiz-back">&larr; Back to Lists</button>
          <div class="quiz-card" id="quiz-card"></div>

      </div>
      <!-- LISTS TAB -->
      <div class="tab-pane" id="tab-lists">
        <div class="lists-container" id="lists-container"></div>
        <div class="list-detail hidden" id="list-detail"></div>
      </div>
      <!-- STAFF TAB -->
      <div class="tab-pane" id="tab-staff">
        <div class="staff-container" id="staff-container"></div>
      </div>
      <!-- DATABASE TAB -->
      <div class="tab-pane" id="tab-database">
        <div class="db-controls">
          <input type="text" class="db-search" id="db-search" placeholder="Search members...">
          <div class="db-filters">
            <select id="filter-membership"><option value="">All Memberships</option></select>
            <select id="filter-type"><option value="">All Types</option></select>
            <select id="filter-tier"><option value="">All Tiers</option>
              <option value="1">Tier 1</option><option value="2">Tier 2</option>
              <option value="3">Tier 3</option><option value="4">Tier 4</option>
            </select>
          </div>
        </div>
        <div class="db-list" id="db-list"></div>
      </div>
    </div>
  </div>

  <!-- PROFILE MODAL -->
  <div class="modal-overlay" id="profile-modal">
    <div class="profile-card" id="profile-card"></div>
  </div>

  // ===== HELPERS =====
  function displayName(g) { return g.first + ' ' + g.last; }
  function tierClass(t) { return 't' + t; }
  function tierLabel(t) { return ['','Must Know','Regular','Occasional','Infrequent'][t]; }
  function tierColor(t) { return ['','var(--tier1)','var(--tier2)','var(--tier3)','var(--tier4)'][t]; }
  function daysUntil(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((d - now) / 86400000);
  }

  // ===== LEITNER =====
  const LEITNER_KEY = 'icc_leitner';
  let leitner = JSON.parse(localStorage.getItem(LEITNER_KEY) || '{}');
  function saveLeitner() { localStorage.setItem(LEITNER_KEY, JSON.stringify(leitner)); }
  function getBox(idx) { return leitner[idx] || 1; }
  function promote(idx) { leitner[idx] = Math.min(5, getBox(idx) + 1); saveLeitner(); }
  function demote(idx) { leitner[idx] = 1; saveLeitner(); }
  function isMastered(idx) { return getBox(idx) >= 5; }

  function buildPool() {
    if (listQuizIds) {
      quizPool = listQuizIds.slice();
    } else if (quizTier === 'all') {
      quizPool = GOLFERS.map((_, i) => i);
    } else {
      quizPool = GOLFERS.map((g, i) => g.tier === quizTier ? i : -1).filter(i => i >= 0);
    }
    // Sort by Leitner box (lower first = needs more practice)
    quizPool.sort((a, b) => getBox(a) - getBox(b));
    updateProgress();
  }

  function updateProgress() {
    const pool = listQuizIds || (quizTier === 'all' ? GOLFERS.map((_,i)=>i) : GOLFERS.map((g,i)=>g.tier===quizTier?i:-1).filter(i=>i>=0));

    document.getElementById('learn-progress-fill').style.width = (total ? mastered/total*100 : 0) + '%';

  }

      return;
    }
    // Pick from front (lowest Leitner box)
    const idx = quizPool.shift();
    currentQ = idx;
    const g = GOLFERS[idx];

    if (quizMode === 'recall') {
      renderRecall(g, idx);
    } else {
      renderQuiz(g, idx);
    }
  }

  function renderQuiz(g, idx) {
    // Pick 3 wrong answers from same tier (or all if not enough)
    const sameTier = GOLFERS.map((x, i) => i).filter(i => i !== idx && GOLFERS[i].tier === g.tier);
    const shuffled = sameTier.sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [idx, ...shuffled].sort(() => Math.random() - 0.5);

    quizCard.innerHTML = `
      <div class="member-photo">${CAM_SVG}</div>
      <div class="choices">
        ${options.map(i => `<div class="choice-btn" data-idx="${i}">${displayName(GOLFERS[i])}</div>`).join('')}
      </div>
      <div class="member-details hidden" id="q-details"></div>
      <div class="tap-hint" id="tap-hint">Tap anywhere to continue</div>
    `;

    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (answered) return;
        answered = true;
        const chosen = parseInt(btn.dataset.idx);
        const correct = chosen === idx;

        if (correct) {
          btn.classList.add('correct');
          promote(idx);
        } else {
          btn.classList.add('wrong');
          document.querySelector(`.choice-btn[data-idx="${idx}"]`).classList.add('correct');
          demote(idx);
        }

        showDetails(g, idx);
        updateProgress();
        setTimeout(() => { tapReady = true; document.getElementById('tap-hint').classList.add('show'); }, 300);
      });
    });
  }

  function renderRecall(g, idx) {
    quizCard.innerHTML = `
      <div class="member-photo">${CAM_SVG}</div>
      <button class="recall-reveal" id="reveal-btn">Tap to Reveal</button>
      <div class="member-details hidden" id="q-details"></div>
      <div class="tap-hint" id="tap-hint">Tap anywhere for next</div>
    `;
    document.getElementById('reveal-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (answered) return;
      answered = true;
      document.getElementById('reveal-btn').classList.add('hidden');
      showDetails(g, idx);
      promote(idx);
      updateProgress();
      setTimeout(() => { tapReady = true; document.getElementById('tap-hint').classList.add('show'); }, 300);
    });
  }

  function showDetails(g, idx) {
    const det = document.getElementById('q-details');
    det.classList.remove('hidden');
    det.innerHTML = `
      <div class="detail-name">${displayName(g)}</div>
      <div class="detail-row"><span class="detail-label">Membership</span><span>${g.membership}</span></div>
      <div class="detail-row"><span class="detail-label">Member #</span><span>${g.memberNumber}</span></div>
      <div class="detail-row"><span class="detail-label">Type</span><span>${g.memberType}</span></div>
      <div class="detail-row"><span class="detail-label">2025 Rounds</span><span>${g.roundsTotal} (${g.rounds18} × 18, ${g.rounds9} × 9)</span></div>
      <div class="detail-row"><span class="detail-label">Tier</span><span class="tier-badge ${tierClass(g.tier)}">${tierLabel(g.tier)}</span></div>
      <div class="detail-row"><span class="detail-label">Leitner Box</span><span>${getBox(idx)}/5</span></div>
    `;
  }

  // Tap anywhere to continue
  document.getElementById('quiz-area').addEventListener('click', () => {
    if (tapReady) nextQuestion();
  });

  // Init
  buildPool();
  nextQuestion();

  // ===== LISTS TAB =====
  const listsContainer = document.getElementById('lists-container');
  const listDetail = document.getElementById('list-detail');

  function renderLists() {
    listsContainer.innerHTML = LISTS.map((list, li) => {
      const total = list.ids.length;
      const mastered = list.ids.filter(i => isMastered(i)).length;
      const pct = total ? Math.round(mastered / total * 100) : 0;
      const days = daysUntil(list.due);
      const urgency = days <= 2 ? 'urgent' : days <= 7 ? 'soon' : 'ok';
      const dayLabel = days < 0 ? Math.abs(days) + 'd overdue' : days === 0 ? 'Today' : days + 'd left';
      return `
        <div class="list-card" data-list="${li}">
          <div class="list-card-header">
            <h3>${list.name}</h3>
            <span class="deadline-badge ${urgency}">${dayLabel}</span>
          </div>
          <div class="list-meta">
            <span>${total} members</span>
            <span>${pct}% complete</span>
          </div>
          <div class="list-progress"><div class="fill" style="width:${pct}%"></div></div>
          <div class="list-actions">
            <button class="btn-view" onclick="event.stopPropagation(); showListDetail(${li})">View</button>
            <button class="btn-test" onclick="event.stopPropagation(); testList(${li})">Test</button>
          </div>
        </div>`;
    }).join('');
  }

  window.showListDetail = function(li) {
    const list = LISTS[li];
    listsContainer.classList.add('hidden');
    listDetail.classList.remove('hidden');
    listDetail.innerHTML = `
      <div class="list-detail-header">
        <button onclick="listsContainer.classList.remove('hidden'); listDetail.classList.add('hidden');">&larr;</button>
        <h3>${list.name}</h3>
      </div>
      ${list.ids.map(idx => {
        const g = GOLFERS[idx];
        const box = getBox(idx);
        const status = box >= 5 ? 'mastered' : box > 1 ? 'learning' : 'new';
        return `
          <div class="member-list-item" onclick="showProfile(${idx})">
            <div class="mini-photo">${CAM_SM}</div>
            <div class="info">
              <div class="name">${displayName(g)}</div>
              <div class="meta">${g.membership} &middot; #${g.memberNumber}</div>
            </div>
            <span class="tier-badge ${tierClass(g.tier)}">T${g.tier}</span>
            <div class="mastery-dot ${status}"></div>
          </div>`;
      }).join('')}
    `;
  };

  window.testList = function(li) {
    const list = LISTS[li];
    listQuizIds = list.ids.slice();
    quizBack.classList.add('show');
    // Switch to learn tab
    tabBtns.forEach(b => b.classList.remove('active'));
    tabPanes.forEach(p => p.classList.remove('active'));
    tabBtns[0].classList.add('active');
    document.getElementById('tab-learn').classList.add('active');
    buildPool();
    nextQuestion();
  };

  renderLists();

  // ===== STAFF TAB =====
  document.getElementById('staff-container').innerHTML = STAFF.map(s => `
    <div class="staff-card">
      <div class="staff-photo">${CAM_SVG}</div>
      <div class="staff-info">
        <div class="name">${s.name}</div>
        <div class="title">${s.title}</div>
        <div class="desc">${s.desc}</div>
        <div class="staff-contact">
          <a href="mailto:${s.email}">&#9993; ${s.email}</a>
          <a href="tel:${s.phone.replace(/[^+\d]/g, '')}">&#9742; ${s.phone}</a>
        </div>
      </div>
    </div>
  `).join('');

  // ===== DATABASE TAB =====
  const dbSearch = document.getElementById('db-search');
  const filterMembership = document.getElementById('filter-membership');
  const filterType = document.getElementById('filter-type');
  const filterTier = document.getElementById('filter-tier');
  const dbList = document.getElementById('db-list');

  // Populate filter options
  const memberships = [...new Set(GOLFERS.map(g => g.membership))].sort();
  memberships.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; filterMembership.appendChild(o); });
  const types = [...new Set(GOLFERS.map(g => g.memberType))].sort();
  types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; filterType.appendChild(o); });

  let dbPage = 0;
  const PAGE_SIZE = 50;

  function renderDB() {
    const q = dbSearch.value.toLowerCase().trim();
    const fm = filterMembership.value;
    const ft = filterType.value;
    const fti = filterTier.value;

    let results = GOLFERS.map((g, i) => ({...g, _i: i}));
    if (q) results = results.filter(g => (g.first + ' ' + g.last).toLowerCase().includes(q) || (g.last + ' ' + g.first).toLowerCase().includes(q));
    if (fm) results = results.filter(g => g.membership === fm);
    if (ft) results = results.filter(g => g.memberType === ft);
    if (fti) results = results.filter(g => g.tier === parseInt(fti));

    const shown = results.slice(0, (dbPage + 1) * PAGE_SIZE);
    const hasMore = shown.length < results.length;

    dbList.innerHTML = `
      <div class="db-count">${results.length} members</div>
      ${shown.map(g => `
        <div class="db-member" onclick="showProfile(${g._i})">
          <div class="mini-photo">${CAM_SM}</div>
          <div class="info">
            <div class="name">${displayName(g)} <span class="tier-badge ${tierClass(g.tier)}">T${g.tier}</span></div>
            <div class="meta">${g.membership} &middot; ${g.memberType} &middot; #${g.memberNumber}</div>
          </div>
          <div class="rounds">
            <div class="num">${g.roundsTotal}</div>
            <div class="label">rounds</div>
          </div>
        </div>
      `).join('')}
      ${hasMore ? '<div style="text-align:center;padding:16px;"><button onclick="dbPage++;renderDB();" style="padding:10px 24px;background:var(--gold);color:var(--green-900);border:none;border-radius:8px;font-weight:600;cursor:pointer;">Load More</button></div>' : ''}
    `;
  }

  dbSearch.addEventListener('input', () => { dbPage = 0; renderDB(); });
  filterMembership.addEventListener('change', () => { dbPage = 0; renderDB(); });
  filterType.addEventListener('change', () => { dbPage = 0; renderDB(); });
  filterTier.addEventListener('change', () => { dbPage = 0; renderDB(); });

  // ===== PROFILE MODAL =====
  const profileModal = document.getElementById('profile-modal');
  const profileCard = document.getElementById('profile-card');

  window.showProfile = function(idx) {
    const g = GOLFERS[idx];
    profileCard.innerHTML = `
      <button class="close-btn" onclick="profileModal.classList.remove('show')">&times;</button>
      <div class="photo-lg">${CAM_SVG}</div>
      <div class="p-name">${displayName(g)}</div>
      <div class="p-tier"><span class="tier-badge ${tierClass(g.tier)}">${tierLabel(g.tier)} &middot; Tier ${g.tier}</span></div>
      <div class="p-fields">
        <div class="p-field"><span class="label">Membership</span><span class="value">${g.membership}</span></div>
        <div class="p-field"><span class="label">Member Type</span><span class="value">${g.memberType}</span></div>
        <div class="p-field"><span class="label">Member #</span><span class="value">${g.memberNumber}</span></div>
        <div class="p-field"><span class="label">18-Hole Rounds</span><span class="value">${g.rounds18}</span></div>
        <div class="p-field"><span class="label">9-Hole Rounds</span><span class="value">${g.rounds9}</span></div>
        <div class="p-field"><span class="label">Total Rounds (2025)</span><span class="value">${g.roundsTotal}</span></div>
        <div class="p-field"><span class="label">Leitner Box</span><span class="value">${getBox(idx)}/5</span></div>
      </div>
    `;
    profileModal.classList.add('show');
  };

  profileModal.addEventListener('click', (e) => {
    if (e.target === profileModal) profileModal.classList.remove('show');
  });

  </script>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
